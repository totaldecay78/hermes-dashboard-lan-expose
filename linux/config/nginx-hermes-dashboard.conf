#
# Hermes Dashboard — nginx reverse proxy for LAN access
# ======================================================
# This config listens on 0.0.0.0:INTERNAL_PORT and proxies to
# 127.0.0.1:DASHBOARD_PORT, rewriting the Host header to 127.0.0.1 so the
# dashboard's Origin/Host validation passes.
#
# Usage:
#   sudo cp nginx-hermes-dashboard.conf /etc/nginx/conf.d/hermes-dashboard.conf
#   sudo systemctl restart nginx
#
# Template variables (replace before deploying):
#   DASHBOARD_PORT — port the Hermes dashboard binds to locally (default: 9119)
#   INTERNAL_PORT  — port nginx listens on for proxy (default: 9191)

server {
    listen INTERNAL_PORT default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:DASHBOARD_PORT;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) streaming — disable buffering
        # so tool call events arrive in real time in the dashboard
        proxy_buffering off;
        proxy_cache off;

        # Long timeouts for WebSocket / SSE
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
