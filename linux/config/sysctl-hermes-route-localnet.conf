# Allow routing traffic to 127.0.0.0/8 from external interfaces.
# Required for iptables DNAT rules that redirect LAN traffic to a local
# service bound to loopback.
#
# Install: sudo cp sysctl-hermes-route-localnet.conf /etc/sysctl.d/99-hermes-route-localnet.conf
net.ipv4.conf.all.route_localnet = 1
